<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF2FF"/>
      <stop offset="100%" stop-color="#D3E4FB"/>
    </linearGradient>
    <linearGradient id="ic1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0B3C8A"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bg1)"/>

  <!-- decorative dot grid -->
  <g fill="#0B3C8A" opacity="0.08">
    <circle cx="80" cy="90" r="5"/><circle cx="110" cy="90" r="5"/><circle cx="140" cy="90" r="5"/>
    <circle cx="80" cy="120" r="5"/><circle cx="110" cy="120" r="5"/>
    <circle cx="520" cy="500" r="5"/><circle cx="490" cy="500" r="5"/><circle cx="460" cy="500" r="5"/>
    <circle cx="520" cy="470" r="5"/><circle cx="490" cy="470" r="5"/>
  </g>

  <!-- baseline -->
  <line x1="150" y1="420" x2="450" y2="420" stroke="#0B3C8A" stroke-width="4" stroke-linecap="round" opacity="0.25"/>

  <!-- bar chart -->
  <rect x="190" y="330" width="46" height="90" rx="8" fill="url(#ic1)" opacity="0.35"/>
  <rect x="260" y="290" width="46" height="130" rx="8" fill="url(#ic1)" opacity="0.55"/>
  <rect x="330" y="240" width="46" height="180" rx="8" fill="url(#ic1)" opacity="0.8"/>
  <rect x="400" y="190" width="46" height="230" rx="8" fill="url(#ic1)"/>

  <!-- trend line with data points -->
  <polyline points="205,300 275,255 345,205 415,155" fill="none" stroke="#0B1C39" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="205" cy="300" r="10" fill="#fff" stroke="#0B1C39" stroke-width="6"/>
  <circle cx="275" cy="255" r="10" fill="#fff" stroke="#0B1C39" stroke-width="6"/>
  <circle cx="345" cy="205" r="10" fill="#fff" stroke="#0B1C39" stroke-width="6"/>
  <circle cx="415" cy="155" r="14" fill="#0B1C39"/>

  <!-- arrow head -->
  <path d="M415 155 L455 118 M455 118 L425 122 M455 118 L451 148" stroke="#0B1C39" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
