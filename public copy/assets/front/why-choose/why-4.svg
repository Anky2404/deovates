<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF2FF"/>
      <stop offset="100%" stop-color="#D3E4FB"/>
    </linearGradient>
    <linearGradient id="ic4" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0B3C8A"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bg4)"/>

  <g fill="#0B3C8A" opacity="0.08">
    <circle cx="100" cy="100" r="5"/><circle cx="130" cy="100" r="5"/><circle cx="160" cy="100" r="5"/>
    <circle cx="100" cy="130" r="5"/><circle cx="130" cy="130" r="5"/>
  </g>

  <!-- infinity loop: long-term partnership -->
  <path d="M225 300 a45 45 0 1 0 0 1 z" fill="none"/>
  <path d="M170 300 c0 -45 45 -45 60 0 c15 45 60 45 60 0 c0 -45 -45 -45 -60 0 c-15 45 -60 45 -60 0 z"
        fill="none" stroke="url(#ic4)" stroke-width="16" stroke-linecap="round" opacity="0.5"/>

  <!-- handshake -->
  <g>
    <path d="M175 330 L235 285 a20 20 0 0 1 25 0 L300 320" fill="none" stroke="#0B1C39" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M425 330 L365 285 a20 20 0 0 0 -25 0 L300 320" fill="none" stroke="#0B3C8A" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M300 320 l24 24 a17 17 0 0 0 24 -24 l-34 -34" fill="#0B1C39"/>
    <path d="M300 320 l-24 24 a17 17 0 0 1 -24 -24 l34 -34" fill="#0B3C8A"/>
    <rect x="150" y="345" width="70" height="46" rx="10" fill="#0B1C39"/>
    <rect x="380" y="345" width="70" height="46" rx="10" fill="#0B3C8A"/>
  </g>

  <!-- shield / support badge -->
  <g transform="translate(300,155)">
    <path d="M0 -45 L42 -28 L42 10 C42 45 22 60 0 70 C-22 60 -42 45 -42 10 L-42 -28 Z" fill="#fff" stroke="#0B1C39" stroke-width="6"/>
    <path d="M-16 3 l12 12 24 -26" fill="none" stroke="#0B3C8A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
