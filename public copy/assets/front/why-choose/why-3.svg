<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF2FF"/>
      <stop offset="100%" stop-color="#D3E4FB"/>
    </linearGradient>
    <linearGradient id="ic3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0B3C8A"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bg3)"/>

  <g fill="#0B3C8A" opacity="0.08">
    <circle cx="500" cy="500" r="5"/><circle cx="470" cy="500" r="5"/><circle cx="440" cy="500" r="5"/>
    <circle cx="500" cy="470" r="5"/><circle cx="470" cy="470" r="5"/>
  </g>

  <!-- skyline representing multiple industries -->
  <g opacity="0.5">
    <rect x="120" y="300" width="60" height="150" rx="4" fill="url(#ic3)"/>
    <rect x="190" y="250" width="60" height="200" rx="4" fill="url(#ic3)"/>
    <rect x="350" y="270" width="60" height="180" rx="4" fill="url(#ic3)"/>
    <rect x="420" y="320" width="60" height="130" rx="4" fill="url(#ic3)"/>
    <rect x="135" y="320" width="14" height="14" fill="#fff"/>
    <rect x="160" y="320" width="14" height="14" fill="#fff"/>
    <rect x="205" y="275" width="14" height="14" fill="#fff"/>
    <rect x="230" y="275" width="14" height="14" fill="#fff"/>
    <rect x="365" y="295" width="14" height="14" fill="#fff"/>
    <rect x="435" y="345" width="14" height="14" fill="#fff"/>
  </g>

  <!-- ground line -->
  <line x1="100" y1="450" x2="500" y2="450" stroke="#0B1C39" stroke-width="4" opacity="0.2"/>

  <!-- central briefcase -->
  <rect x="230" y="290" width="140" height="105" rx="14" fill="#0B1C39"/>
  <rect x="260" y="260" width="80" height="34" rx="10" fill="none" stroke="#0B1C39" stroke-width="12"/>
  <rect x="230" y="330" width="140" height="20" fill="#0B3C8A"/>
  <rect x="288" y="322" width="24" height="24" rx="4" fill="#fff"/>

  <!-- gear accent -->
  <g transform="translate(415,215)" fill="none" stroke="#0B3C8A" stroke-width="8">
    <circle r="30"/>
    <path d="M0 -40 L0 -50 M0 40 L0 50 M-40 0 L-50 0 M40 0 L50 0 M-28 -28 L-35 -35 M28 28 L35 35 M-28 28 L-35 35 M28 -28 L35 -35" stroke-linecap="round"/>
  </g>
</svg>
